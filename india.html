<audio id="mySong" autoplay muted style="display:none;" >
        <source src="video.mp3" type="audio/mpeg">
</audio>
<script>                                           
     var song = document.getElementById("mySong");     
    document.addEventListener('click', function() {
            song.muted = false; 
            song.play();
        }, { once: true });
    song.ontimeupdate = function() {
      if (song.currentTime >= 10) { 
            song.pause(); } 
        };
</script>
